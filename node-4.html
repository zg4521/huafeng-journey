<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课程感悟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  /* ===== Animated background layers ===== */
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: -1;
  }
  .bg-base {
    background:
      radial-gradient(ellipse 70% 50% at 50% 30%, rgba(25,40,80,0.4) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 25% 70%, rgba(50,15,60,0.25) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 75% 70%, rgba(15,45,70,0.25) 0%, transparent 55%),
      linear-gradient(180deg, #070a18 0%, #0c0a14 45%, #060810 100%);
  }
  /* Subtle pulsing glow */
  .bg-glow {
    background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(60,100,180,0.05) 0%, transparent 70%);
    animation: glowPulse 8s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50%      { opacity: 0.8; transform: scale(1.15); }
  }

  /* ===== Title ===== */
  .page-title {
    position: fixed; top: 0; left: 0; right: 0;
    text-align: center;
    padding: clamp(16px, 2.5vh, 22px) 20px clamp(8px, 1.5vh, 14px);
    z-index: 10; pointer-events: none;
  }
  .page-title h1 {
    font-size: clamp(1.1rem, 2.4vw, 1.6rem); font-weight: 600;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.85);
  }

  /* ===== Back button ===== */
  .back-btn {
    position: fixed; top: clamp(12px, 1.8vh, 18px); left: clamp(10px, 2vw, 18px);
    z-index: 20;
    padding: clamp(5px, 1vh, 8px) clamp(12px, 2vw, 18px); border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.45); color: #fff;
    text-decoration: none; font-size: clamp(0.65rem, 1.1vw, 0.8rem);
    letter-spacing: 0.04em; transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
  }

  /* ===== Gallery Container ===== */
  #gallery {
    position: fixed; inset: 0;
    overflow: hidden;
  }

  /* Dot grid */
  .dot-grid {
    position: absolute; inset: 0;
    opacity: 0.06; pointer-events: none;
    background-image: radial-gradient(circle, rgba(255,255,255,0.5) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ===== Photo tiles ===== */
  .photo-tile {
    position: absolute;
    overflow: hidden;
    pointer-events: none;
    opacity: 0;
    transform: scale(0.3);
    background: #0a0a0a;
  }
  .photo-tile img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
</head>
<body>

<div class="bg-layer bg-base"></div>
<div class="bg-layer bg-glow"></div>

<div id="gallery">
  <div class="dot-grid"></div>
</div>

<div class="page-title"><h1>课程感悟</h1></div>
<a href="index.html" class="back-btn">← 返回华峰征程</a>

<script>
(function() {

  // ===== Photo pool =====
  const photoPool = [
    "4F8B0611.JPG", "4F8B0612.JPG", "4F8B0644.JPG", "4F8B0869.JPG",
    "4F8B1460.JPG", "4F8B1706.JPG", "4F8B1724.JPG", "4F8B1738.JPG",
    "593A0202.JPG",
    "DSC00675.JPG", "DSC00730.JPG", "DSC00779.JPG", "DSC00887.JPG",
    "DSC00928.JPG", "DSC01054.JPG", "DSC01117.JPG", "DSC01121.JPG",
    "DSC01249.JPG", "DSC01255.JPG", "DSC01301.JPG",
    "大合影.JPG", "宣誓2.JPG",
  ].map(f => 'node4-photos/' + f);

  const TOTAL = photoPool.length; // 22

  // Preload
  photoPool.forEach(src => { const i = new Image(); i.src = src; });

  // ===== DOM =====
  const gallery = document.getElementById('gallery');

  // ===== Compute grid layout =====
  function computeGrid() {
    const W = window.innerWidth;
    const H = window.innerHeight;

    // Pick columns based on aspect ratio — wider screen = more columns
    let cols;
    if (W / H > 2)        cols = 7;       // ultra-wide
    else if (W / H > 1.6) cols = 6;       // 16:9
    else if (W / H > 1.2) cols = 5;       // 4:3-ish
    else                   cols = 4;       // portrait / square

    const rows = Math.ceil(TOTAL / cols);

    // Margins and gaps — smaller on mobile, larger on desktop
    const marginX = Math.max(12, W * 0.04);
    const marginY = Math.max(20, H * 0.07);
    const gapX = Math.max(4, W * 0.015);
    const gapY = Math.max(6, H * 0.02);

    const cellW = (W - 2 * marginX - (cols - 1) * gapX) / cols;
    const cellH = (H - 2 * marginY - (rows - 1) * gapY) / rows;

    const positions = [];
    for (let i = 0; i < TOTAL; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);

      // Center last row if incomplete
      const totalInRow = (row === rows - 1 && TOTAL % cols !== 0)
        ? TOTAL % cols
        : cols;
      const rowOffset = (cols - totalInRow) * 0.5;

      const x = marginX + (col + rowOffset) * (cellW + gapX);
      const y = marginY + row * (cellH + gapY);

      positions.push({ x, y, w: cellW, h: cellH });
    }
    return positions;
  }

  let gridPositions = computeGrid();

  // Recompute on resize
  window.addEventListener('resize', () => {
    gridPositions = computeGrid();
  });

  // ===== Shuffle photos for variety each round =====
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ===== Run one full cycle =====
  function runCycle() {
    const positions = gridPositions; // snapshot for this cycle
    const shuffled = shuffle(photoPool);
    const tiles = [];
    let spawned = 0;

    // Spawn delay between each photo (ms)
    const SPAWN_GAP = 400;
    // Hold time after all photos placed (ms)
    const HOLD_ALL = 5000;
    // Exit animation duration (ms)
    const EXIT_DUR = 800;

    function placeOne() {
      if (spawned >= TOTAL) {
        // All placed — hold then clear
        setTimeout(clearAll, HOLD_ALL);
        return;
      }

      const idx = spawned;
      const pos = positions[idx];
      const src = shuffled[idx];
      spawned++;

      // Random fly-in start position (from outside viewport)
      const side = Math.floor(Math.random() * 4); // 0=top, 1=right, 2=bottom, 3=left
      const W = window.innerWidth;
      const H = window.innerHeight;
      let startX, startY;
      switch (side) {
        case 0: startX = pos.x + pos.w / 2 + (Math.random() - 0.5) * W * 0.6; startY = -pos.h * 1.5; break;
        case 1: startX = W + pos.w;              startY = pos.y + pos.h / 2 + (Math.random() - 0.5) * H * 0.6; break;
        case 2: startX = pos.x + pos.w / 2 + (Math.random() - 0.5) * W * 0.6; startY = H + pos.h;            break;
        case 3: startX = -pos.w * 1.5;           startY = pos.y + pos.h / 2 + (Math.random() - 0.5) * H * 0.6; break;
      }

      // Create tile
      const el = document.createElement('div');
      el.className = 'photo-tile';
      el.style.cssText = `
        left: ${pos.x}px; top: ${pos.y}px;
        width: ${pos.w}px; height: ${pos.h}px;
        opacity: 0;
        transform: scale(0.3);
        z-index: ${idx};
      `;

      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      el.appendChild(img);
      gallery.appendChild(el);

      // Animate in with CSS transition
      requestAnimationFrame(() => {
        // Set start position via transform
        const dx = startX - (pos.x + pos.w / 2);
        const dy = startY - (pos.y + pos.h / 2);
        el.style.transition = 'none';
        el.style.transform = `translate(${dx}px, ${dy}px) scale(0.3)`;
        el.style.opacity = '0.8';

        requestAnimationFrame(() => {
          el.style.transition = 'transform 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease';
          el.style.transform = 'translate(0, 0) scale(1)';
          el.style.opacity = '1';
        });
      });

      tiles.push(el);

      // Schedule next
      setTimeout(placeOne, SPAWN_GAP);
    }

    function clearAll() {
      // All tiles exit together
      tiles.forEach(el => {
        el.style.transition = 'transform 0.8s ease-in, opacity 0.6s ease-in';
        el.style.transform = 'scale(0.2)';
        el.style.opacity = '0';
      });

      // Remove after exit animation
      setTimeout(() => {
        tiles.forEach(el => el.remove());
        // Restart cycle after brief pause
        setTimeout(runCycle, 600);
      }, EXIT_DUR);
    }

    // Kick off
    placeOne();
  }

  // ===== Start =====
  runCycle();

  // ===== Visibility =====
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      gallery.querySelectorAll('.photo-tile').forEach(el => el.remove());
    }
    // On return, the current cycle will finish and restart naturally
  });

})();
</script>
</body>
</html>
